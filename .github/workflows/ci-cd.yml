name: Build and Test
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
jobs:
  BuildSecrets:
    runs-on: ubuntu-latest
    environment: database
    steps:
      - uses: actions/checkout@v6
      - name: Create .env file
        run: |
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
          echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
          echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env
          echo "MYSQL_HOST=${{ secrets.MYSQL_HOST }}" >> .env
          echo "ConnectionStrings__AppDbContext=Server=${{ secrets.MYSQL_HOST }};Port=3307;Database=${{ secrets.MYSQL_DATABASE }};User=${{ secrets.MYSQL_USER }};Password=${{ secrets.MYSQL_PASSWORD }}" >> .env
          echo "TokenValidationParameters__IssuerSigningKey=${{ secrets.TOKENVALIDATIONPARAMETERS__ISSUERSIGNINGKEY }}" >> .env
      - name: Upload .env file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: env-file
          path: .env
          if-no-files-found: warn
          compression-level: 6
          overwrite: false
          include-hidden-files: true

  build:
    name: Build and Test
    needs: BuildSecrets
    runs-on: ubuntu-latest
    environment: database
    steps:
      - uses: actions/checkout@v6
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.420
      - name: Download .env file artifact
        uses: actions/download-artifact@v4
        with:
          name: env-file
      - name: Copy .env file to API project
        run: cp .env src/Api/.env
      - name: Load .env file
        run: export $(cat .env | xargs)
      - name: Restore dependencies
        run: dotnet restore Slottet.CareManagement.sln
      - name: Build
        run: dotnet build --no-restore Slottet.CareManagement.sln
      - name: Test
        run: dotnet test ./Slottet.CareManagement.sln --no-build --verbosity normal --collect:"XPlat Code Coverage"
      - name: Upload code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-results
          path: "**/TestResults/**/coverage.cobertura.xml"
          if-no-files-found: warn
      - name: Notify committer on test failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = github.context.payload.pull_request;
            if (pr) {
              const committer = pr.user.login;
              const message = `@${committer} :x: Tests failed for this pull request. Please check the logs and fix the issues.`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: message
              });
            }
