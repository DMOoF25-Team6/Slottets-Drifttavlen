name: Build and Test
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
jobs:
  BuildSecrets:
    runs-on: ubuntu-latest
    environment: database
    steps:
      - uses: actions/checkout@v6
      - name: Create .env file
        run: |
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
          echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
          echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env
          echo "MYSQL_HOST=${{ secrets.MYSQL_HOST }}" >> .env
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "ConnectionStrings__AppDbContext=Server=${{ secrets.MYSQL_HOST }};Port=3307;Database=${{ secrets.MYSQL_DATABASE }};User=${{ secrets.MYSQL_USER }};Password=${{ secrets.MYSQL_PASSWORD }}" >> .env
          echo "TokenValidationParameters__IssuerSigningKey=${{ secrets.TOKENVALIDATIONPARAMETERS__ISSUERSIGNINGKEY }}" >> .env
      - name: Upload .env file as artifact
        uses: actions/upload-artifact@v7
        with:
          name: env-file
          path: .env
          if-no-files-found: warn
          compression-level: 6
          overwrite: false
          include-hidden-files: true
          archive: true

  build:
    needs: BuildSecrets
    runs-on: ubuntu-latest
    environment: database
    steps:
      - uses: actions/checkout@v6
      - name : Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - name: Download .env file artifact
        uses: actions/download-artifact@v8
        with:
          name: env-file
      - name: Copy .env file to API project
        run: cp .env src/Api/.env
      - name: Load .env file
        run: export $(cat .env | xargs)
      - name: Restore dependencies
        run: dotnet restore Slottet.CareManagement.sln
      - name: Build
        run: dotnet build --no-restore Slottet.CareManagement.sln
      - name: Test with coverage (excluding WebUI.Tests)
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          for proj in $(find ./tests -name '*.csproj' | grep -v 'WebUI.Tests'); do
            # dotnet test "$proj" --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults;
            dotnet test --project "$proj" -c Release --results-directory ./TestResults --collect:"XPlat Code Coverage" --logger "trx"
          done
          # Execute WebUI.Tests.dll directly if it exists
          #if [ -f ./tests/WebUI.Tests/bin/Debug/net8.0/WebUI.Tests.dll ]; then
          #  dotnet ./tests/WebUI.Tests/bin/Debug/net8.0/WebUI.Tests.dll || true
          #fi

          #reportgenerator -reports:./TestResults/**/coverage.cobertura.xml -targetdir:./TestResults/coverage-html -reporttypes:Html
      - name: Upload coverage HTML results
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: ./TestResults/coverage-html

